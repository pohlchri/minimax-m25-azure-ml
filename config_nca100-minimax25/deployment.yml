$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: current
endpoint_name: minimax-m25-prod
environment_variables:
  MODEL_NAME: MiniMaxAI/MiniMax-M2.5
  VLLM_ARGS: >-
    --tensor-parallel-size 4
    --tool-call-parser minimax_m2
    --reasoning-parser minimax_m2
    --enable-auto-tool-choice
    --trust-remote-code
    --enforce-eager
  NCCL_P2P_DISABLE: "1"
  VLLM_DISABLED_KERNELS: "TritonFp8BlockScaledMMKernel"
environment:
  image: PLACEHOLDER_ACR_IMAGE
  inference_config:
    liveness_route:
      port: 8000
      path: /ping
    readiness_route:
      port: 8000
      path: /health
    scoring_route:
      port: 8000
      path: /
instance_type: Standard_NC96ads_A100_v4
instance_count: 1
request_settings:
  max_concurrent_requests_per_instance: 32
  request_timeout_ms: 120000
liveness_probe:
  initial_delay: 1800
  period: 10
  timeout: 2
  success_threshold: 1
  failure_threshold: 30
readiness_probe:
  initial_delay: 1800
  period: 10
  timeout: 2
  success_threshold: 1
  failure_threshold: 60
